<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- App Store / Play Store Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="eStore" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#1e3a8a" />
    
    <!-- App Icons -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Font Awesome for icons (optional) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <title>eStore - Marketplace</title>
    
    <!-- Mobile Display Fixes -->
    <style>
      /* Reset and base styles */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      
      html, body {
        overflow-x: hidden;
        width: 100%;
        max-width: 100%;
        -webkit-text-size-adjust: 100%;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background: #ffffff;
        color: #1a202c;
        overscroll-behavior: none;
      }
      
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 100%;
        overflow-x: hidden;
      }
      
      /* Touch target improvements */
      button, 
      a,
      input,
      select,
      textarea {
        min-height: 44px;
        min-width: 44px;
        touch-action: manipulation;
      }
      
      /* Prevent zoom on double tap */
      input, textarea, select {
        font-size: 16px !important;
      }
      
      /* Mobile scrollbar hiding */
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      /* Smooth scrolling */
      .smooth-scroll {
        -webkit-overflow-scrolling: touch;
      }
      
      /* Disable pull-to-refresh on iOS */
      .no-pull-refresh {
        overscroll-behavior: contain;
      }
      
      /* Better touch feedback */
      .touch-feedback:active {
        opacity: 0.7;
        transform: scale(0.98);
        transition: all 0.05s ease;
      }
      
      /* Fix for iOS input zoom */
      @media screen and (-webkit-min-device-pixel-ratio: 0) {
        input, select, textarea {
          font-size: 16px !important;
        }
      }
      
      /* Mobile first responsive */
      @media (max-width: 640px) {
        .mobile-full-width {
          width: 100%;
          padding-left: 12px;
          padding-right: 12px;
        }
        
        .mobile-no-padding {
          padding-left: 0 !important;
          padding-right: 0 !important;
        }
        
        /* Improve touch targets on mobile */
        button, a, .clickable {
          min-height: 44px;
          min-width: 44px;
        }
        
        /* Better card spacing on mobile */
        .mobile-card {
          padding: 12px;
          margin-bottom: 8px;
        }
        
        /* Prevent text overflow */
        .mobile-text-ellipsis {
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
        }
      }
      
      /* Landscape mode fixes */
      @media (max-width: 812px) and (orientation: landscape) {
        .landscape-adjust {
          padding-top: 8px;
          padding-bottom: 8px;
        }
      }
      
      /* Dark mode support */
      @media (prefers-color-scheme: dark) {
        body {
          background: #0a0a0a;
          color: #e2e8f0;
        }
      }
      
      /* Loading skeleton animation */
      @keyframes shimmer {
        0% {
          background-position: -200px 0;
        }
        100% {
          background-position: calc(200px + 100%) 0;
        }
      }
      .skeleton {
        background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
        background-size: 200px 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
